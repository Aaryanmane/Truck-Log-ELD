databases:
  - name: truck-eld-db
    plan: free

services:
  # Backend Django API
  - type: web
    name: truck-eld-backend
    runtime: python
    buildCommand: "./build.sh" # Ensure this script exists and is executable
    startCommand: "gunicorn truck_eld_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com,truck-eld-backend-m7w3.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://truck-eld-frontend-two.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://truck-eld-frontend-two.vercel.app,https://*.onrender.com"
      - key: DATABASE_URL # Render automatically populates this
        fromDatabase:
          name: truck-eld-db
          property: connectionString

  # Frontend React (Static)
  - type: static
    name: truck-eld-frontend
    buildCommand: "npm install && npm run build"
    publishPath: dist # Ensure your vite.config.js outputs to 'dist'